name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run check

      - name: Build Windows package
        run: npm run package:win -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Local VTT Windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  macos:
    name: macOS Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run check

      - name: Build macOS package
        run: npm run package:mac -- --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Local VTT macOS
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. Create a new version/tag instead of replacing immutable release assets."
            exit 1
          fi
          mapfile -d '' release_files < <(find release-artifacts -type f -print0)
          gh release create "$TAG_NAME" "${release_files[@]}" --repo "$GH_REPO" --title "$TAG_NAME" --notes "Local VTT $TAG_NAME" --verify-tag
