<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LocalVTT</title>
    <style>
      body {
        margin: 0;
        background: #0f1318;
        color: #e7ecf3;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-splash {
        display: grid;
        place-items: center;
        align-content: center;
        gap: 14px;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(180deg, rgb(23 30 39 / 0.98), rgb(8 12 18 / 1)), #0f1318;
      }

      .startup-splash-mark {
        color: #eef3f9;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .startup-splash-spinner {
        width: 30px;
        height: 30px;
        border: 3px solid rgb(122 162 247 / 0.2);
        border-top-color: #7aa2f7;
        border-radius: 999px;
        animation: localvtt-spin 840ms linear infinite;
      }

      .startup-splash-status {
        color: #9aa6b7;
        font-size: 13px;
      }

      @keyframes localvtt-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-splash">
        <div class="startup-splash-mark">Local VTT</div>
        <div class="startup-splash-spinner" aria-hidden="true"></div>
        <div class="startup-splash-status">Starting Local VTT...</div>
      </div>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
